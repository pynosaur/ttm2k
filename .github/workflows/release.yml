name: Release

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'doc/**'
      - '.program'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-24.04-arm
            target: linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get metadata
        id: meta
        run: |
          version=$(grep '^version:' .program | cut -d' ' -f2)
          name=$(grep '^name:' .program | cut -d' ' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "asset=${name}-${version}-${{ matrix.target }}" >> "$GITHUB_OUTPUT"

      - name: Install Nuitka
        run: pip install nuitka ordered-set zstandard

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf ccache

      - name: Build binary
        run: |
          python -m nuitka \
            --onefile \
            --include-data-dir=doc=doc \
            --onefile-tempdir-spec=/tmp/nuitka-${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }} \
            --no-progressbar \
            --assume-yes-for-downloads \
            --output-filename=${{ steps.meta.outputs.asset }} \
            app/main.py

      - name: Verify binary
        run: |
          ./${{ steps.meta.outputs.asset }} --version
          ./${{ steps.meta.outputs.asset }} --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.asset }}
          path: ${{ steps.meta.outputs.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get metadata
        id: meta
        run: |
          version=$(grep '^version:' .program | cut -d' ' -f2)
          name=$(grep '^name:' .program | cut -d' ' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Prepare assets
        run: |
          mkdir -p release/
          find dist/ -type f -exec cp {} release/ \;
          chmod +x release/*
          ls -la release/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          name="${{ steps.meta.outputs.name }}"
          version="${{ steps.meta.outputs.version }}"

          if gh release view "$tag" > /dev/null 2>&1; then
            gh release upload "$tag" release/* --clobber
            gh release edit "$tag" \
              --title "$name $version" \
              --notes "Release $name $version"
          else
            gh release create "$tag" release/* \
              --title "$name $version" \
              --notes "Release $name $version" \
              --latest
          fi
